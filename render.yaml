# Render Blueprint: API + in-process Celery worker, PostgreSQL, Redis
# Worker runs in same container as API when separate worker service is not available on plan.
# Set REDIS_URL, R2_*, and CORS_ORIGINS in the Render dashboard.

databases:
  - name: gait-db
    databaseName: gait_analyzer
    user: gait
    plan: basic-256mb

services:
  - type: web
    name: gait-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gait-db
          property: connectionString
      - key: REDIS_URL
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      # Optional: set to reduce worker memory (e.g. GAIT_MAX_FRAMES=600, GAIT_MAX_WIDTH=960)
      - key: GAIT_MAX_FRAMES
        sync: false
      - key: GAIT_MAX_WIDTH
        sync: false
