# Render Blueprint: API service, background worker, PostgreSQL, Redis
# Worker is now a separate Render service for independent scaling.
# Set UPLOAD_TOKEN, CORS_ORIGINS, and R2_* in the Render dashboard after deploy.

databases:
  - name: gait-db
    databaseName: gait_analyzer
    user: gait
    plan: basic-256mb

services:
  - type: redis
    name: gait-redis
    plan: free
    ipAllowList: []   # internal access only

  - type: web
    name: gait-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gait-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: gait-redis
          type: redis
          property: connectionString
      - key: UPLOAD_TOKEN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      # Shared secret for upload/delete endpoints. Set to a random string and
      # also set NEXT_PUBLIC_UPLOAD_TOKEN to the same value in Vercel.
      - key: UPLOAD_TOKEN
        sync: false
      # Optional: set to reduce worker memory (e.g. GAIT_MAX_FRAMES=600, GAIT_MAX_WIDTH=960)
      - key: GAIT_MAX_FRAMES
        sync: false
      - key: GAIT_MAX_WIDTH
        sync: false

  - type: worker
    name: gait-worker
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    startCommand: "celery -A backend.worker worker -l info -c 1"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gait-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: gait-redis
          type: redis
          property: connectionString
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      # Optional: set to reduce worker memory (e.g. GAIT_MAX_FRAMES=600, GAIT_MAX_WIDTH=960)
      - key: GAIT_MAX_FRAMES
        sync: false
      - key: GAIT_MAX_WIDTH
        sync: false
