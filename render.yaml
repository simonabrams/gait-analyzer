# Render Blueprint: API, Celery worker, PostgreSQL, Redis
# Set REDIS_URL, R2_*, and CORS_ORIGINS in the Render dashboard for each service.

databases:
  - name: gait-db
    databaseName: gait_analyzer
    user: gait
    plan: basic-256mb

services:
  - type: web
    name: gait-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gait-db
          property: connectionString
      - key: REDIS_URL
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false

  - type: pserv
    name: gait-worker
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    dockerCommand: celery -A backend.worker worker -l info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gait-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
